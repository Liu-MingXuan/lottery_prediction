<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩票预测系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>彩票预测系统</h1>

        <!-- 查询面板 -->
        <div class="panel">
            <h2>查询参数</h2>
            <div class="form-row">
                <label>参考历史期数：
                    <input type="number" id="period" value="0" min="0" placeholder="0=全部">
                </label>
                <label>预测组数：
                    <input type="number" id="count" value="5" min="1" max="20">
                </label>
                <button id="btn-predict" onclick="runPredict()">开始预测</button>
                <span id="status"></span>
            </div>
        </div>

        <!-- 历史开奖 -->
        <div class="panel" id="panel-history">
            <h2>历史开奖记录</h2>
            <div class="tabs">
                <button class="tab active" onclick="loadHistory('ssq', this)">双色球</button>
                <button class="tab" onclick="loadHistory('dlt', this)">大乐透</button>
            </div>
            <div id="history-table"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <!-- 预测结果 -->
        <div class="panel">
            <h2>预测结果</h2>
            <div id="predict-result" class="placeholder">点击"开始预测"获取结果</div>
        </div>

        <!-- 号码分析 -->
        <div class="panel" id="panel-analysis">
            <h2>号码分析</h2>
            <div class="form-row" style="margin-bottom:12px;">
                <label>参考历史期数：
                    <input type="number" id="analysis-period" value="0" min="0" placeholder="0=全部">
                </label>
                <button id="btn-analysis" onclick="runAnalysis()">分析</button>
                <span id="analysis-status"></span>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchAnalysisType('ssq', this)">双色球</button>
                <button class="tab" onclick="switchAnalysisType('dlt', this)">大乐透</button>
            </div>

            <!-- 热力图 -->
            <h3 class="section-title">号码热力图</h3>
            <div id="heatmap-main" class="heatmap"></div>
            <div id="heatmap-bonus" class="heatmap" style="margin-top:8px;"></div>

            <!-- 概率排行 -->
            <h3 class="section-title">中奖概率排行（降序）</h3>
            <div class="dual-table">
                <div>
                    <div class="table-label" id="prob-main-label">前区</div>
                    <div id="prob-ranking-main"></div>
                </div>
                <div>
                    <div class="table-label" id="prob-bonus-label">后区</div>
                    <div id="prob-ranking-bonus"></div>
                </div>
            </div>

            <!-- 遗漏排行 -->
            <h3 class="section-title">遗漏期数排行（降序）</h3>
            <div class="dual-table">
                <div>
                    <div class="table-label" id="miss-main-label">前区</div>
                    <div id="miss-ranking-main"></div>
                </div>
                <div>
                    <div class="table-label" id="miss-bonus-label">后区</div>
                    <div id="miss-ranking-bonus"></div>
                </div>
            </div>

            <!-- 统计特征 -->
            <h3 class="section-title">统计特征</h3>
            <div id="stats-panel" class="stats-grid"></div>

            <div id="analysis-periods-info" style="margin-top:12px;font-size:12px;color:#999;"></div>
        </div>

        <!-- 号码概率 -->
        <div class="panel" id="panel-prob">
            <h2>号码概率总表</h2>
            <div class="tabs">
                <button class="tab active" onclick="loadProb('ssq', this)">双色球</button>
                <button class="tab" onclick="loadProb('dlt', this)">大乐透</button>
            </div>
            <div id="prob-table"></div>
        </div>

        <!-- 号码查询 -->
        <div class="panel" id="panel-check">
            <h2>号码查询</h2>
            <div class="tabs">
                <button class="tab active" onclick="setCheckType('ssq', this)">双色球</button>
                <button class="tab" onclick="setCheckType('dlt', this)">大乐透</button>
            </div>
            <div class="check-form">
                <div class="input-row">
                    <label id="label-main">红球号码（6个）：</label>
                    <input type="text" id="check-main" placeholder="例如: 01 05 12 23 30 33">
                </div>
                <div class="input-row">
                    <label id="label-bonus">蓝球号码：</label>
                    <input type="text" id="check-bonus" placeholder="例如: 07">
                </div>
                <div class="check-buttons">
                    <button onclick="checkHistory()">查询历史匹配</button>
                    <button onclick="checkPrize()">计算中奖等级</button>
                </div>
            </div>
            <div id="check-result"></div>

            <!-- 奖级表 -->
            <h3 style="margin-top:16px;font-size:14px;">奖级表</h3>
            <div id="prize-table"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
